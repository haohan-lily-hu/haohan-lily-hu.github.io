          title: Haohan Lily Hu
          subtitle: "Welcome to my home page! I am a Ph.D. candidate in Journalism and Communication at the University of Hong Kong. /n My research interest focus on comparative political communication, multimodal communication (text, image, video), and computational analysis of news discourse. Methodologically, I’m interested in computational social science, especially natural language processing, (multimodal) large language model, and visual analyses. I am experienced in 3D animation, VR game production, and programming languages such as Python, R, C#, and SQL. I also enjoy the process of learning and exploring novel facets of emerging technologies and media. I obtained my M.J. (Journalism) degree at the University of Hong Kong and B.Sc from the School of Creative Media at the City University of Hong Kong. Outside academia, I have worked as a journalism and communication intern at China Daily and Hong Kong Trade Development Council."
