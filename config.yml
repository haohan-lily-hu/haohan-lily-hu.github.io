          subtitle: "Welcome to my home page! I am a Ph.D. candidate in Journalism and Communication at the University of Hong Kong.<br/><br/>My research interest focus on comparative political communication, multimodal communication (text, image, video), and computational analysis of news discourse. Methodologically, I’m interested in computational social science, especially natural language processing, (multimodal) large language model, and visual analyses. I also enjoy the process of learning and exploring novel facets of emerging technologies and media."
